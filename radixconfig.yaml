apiVersion: radix.equinor.com/v1
kind: RadixApplication
metadata:
  name: flow-landpage-test
spec:
  environments:
    - name: dev
      build:
        from: master
  components:
    - name: redis
      image: bitnami/redis:latest
      secrets:
        - REDIS_PASSWORD
      ports:
        - name: redis
          port: 6379
    - name: frontend
      src: frontend
      publicPort: http
      ports:
        - name: http
          port: 8001
      environmentConfig:
        - environment: dev
          authentication:
            oauth2:
              clientId: d826142e-d4f6-4664-b463-6d99fc81fb90
              scope: openid profile email offline_access ad711600-154b-4ab0-8945-06cba7f10c4b/MaintenanceAPIQA
              setXAuthRequestHeaders: true
              setAuthorizationHeader: false
              oidc:
                issuerUrl: https://login.microsoftonline.com/3aa4a235-b6e2-48d5-9195-7fcf05b459b0/v2.0
                jwksUrl: https://login.microsoftonline.com/3aa4a235-b6e2-48d5-9195-7fcf05b459b0/discovery/v2.0/keys
                skipDiscovery: false
                insecureSkipVerifyNonce: false
              loginUrl: https://login.microsoftonline.com/3aa4a235-b6e2-48d5-9195-7fcf05b459b0/oauth2/v2.0/authorize
              redeemUrl: https://login.microsoftonline.com/3aa4a235-b6e2-48d5-9195-7fcf05b459b0/oauth2/v2.0/token
              sessionStoreType: redis
              redisStore:
                connectionUrl: redis://redis:6379
              cookieStore:
                minimal: false
              cookie:
                name: _oauth2_proxy
                expire: 168h0m0s
                refresh: 60m0s
                sameSite: lax
  dnsAppAlias:
    environment: dev
    component: frontend
